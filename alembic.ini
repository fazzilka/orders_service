[alembic]
script_location = alembic
prepend_sys_path = .

# This value is overridden in alembic/env.py by DATABASE_URL env var.
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost:5432/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s | %(levelname)s | %(name)s | %(message)s

